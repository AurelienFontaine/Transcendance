<html>
    <head>
        <title>Transcendence fini</title>
        <link rel="stylesheet" href="style.css" />
        <script>
            async function pingBackend() {
            const res = await fetch("http://localhost:3000/ping");
            const data = await res.json();
            alert(data.message);                  
            }

            async function createUser(event) {
                event.preventDefault(); //pour empecher le reload de la page
                const name = document.getElementById("name").value;
                const email = document.getElementById("email").value;

                const response = await fetch("http://localhost:3000/users", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({name, email}),
                });
                const data = await response.json();
                alert(JSON.stringify(data));
            }
        </script>
    </head>
    <body>
        <h1>Hello World!</h1>
        <div class="container">
            <h2>Ajouter un user</h2>
            <form onsubmit="createUser(event)">
                <label>Nom: <input type="text" id="name" required /></label><br />
                <label>Email: <input type="email" id="email" required /></label><br />
                <button type="submit">Envoyer</button>
            </form>
            <div class="game"> 
                <p>Inserer jeu.fun</p>
                <button onclick="pingBackend()">ping</button>
            </div>
        </div>
        <p>Page generee par docker.</p>
    </body>

</html>
