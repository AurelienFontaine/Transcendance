<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pong SPA</title>
  <!-- Suppress p5.js sensor warnings by blocking sensor APIs and intercepting console -->
  <script>
    (function() {
      // Block device orientation/motion event listeners to prevent p5.js from using them
      if (window.DeviceOrientationEvent) {
        Object.defineProperty(window, 'DeviceOrientationEvent', {
          value: undefined,
          writable: false,
          configurable: false
        });
      }
      if (window.DeviceMotionEvent) {
        Object.defineProperty(window, 'DeviceMotionEvent', {
          value: undefined,
          writable: false,
          configurable: false
        });
      }
      
      // Intercept console.warn
      const originalWarn = console.warn;
      console.warn = function() {
        const message = arguments[0]?.toString() || '';
        if (message.includes('orientation sensor') || message.includes('motion sensor') || message.includes('deprecated')) {
          return;
        }
        originalWarn.apply(console, arguments);
      };
      
      // Intercept console.log
      const originalLog = console.log;
      console.log = function() {
        const message = arguments[0]?.toString() || '';
        if (message.includes('orientation sensor') || message.includes('motion sensor')) {
          return;
        }
        originalLog.apply(console, arguments);
      };
    })();
  </script>
  <!-- <script type="module" src="/dist/main.js" defer></script> -->
  <script type="module" src="main.js" defer></script>
  <link rel="stylesheet" href="/output.css">

</head>
<script>
	document.addEventListener('DOMContentLoaded', () => {
		const root = document.documentElement;
		const dropdown = document.querySelector('.dropdown.dropdown-end');
		if (!dropdown) return;

		const trigger = dropdown.querySelector('[role="button"][tabindex="0"]');
		const menu = dropdown.querySelector('#themeMenu');
		if (!menu) return;

		const items = [...menu.querySelectorAll('a[data-set-theme]')];

		// Restaure le thème + ARIA
		let saved = null;
		try { saved = localStorage.getItem('theme'); } catch {}
		if (saved) root.setAttribute('data-theme', saved);
		const current = saved || root.getAttribute('data-theme');
		if (current) items.forEach(a => a.setAttribute('aria-checked', String(a.dataset.setTheme === current)));

		// Entrée/Espace sur le "bouton" Theme -> focus 1er item (ouvre le dropdown via le focus interne)
		if (trigger) {
			trigger.addEventListener('keydown', (e) => {
				if (e.key === 'Enter' || e.key === ' ') {
					e.preventDefault();
					items[0]?.focus();
				}
			});
		}

		// Clic/activation sur un item -> applique le thème + ARIA + persistance
		menu.addEventListener('click', (e) => {
			const a = e.target.closest('a[data-set-theme]');
			if (!a) return;
			e.preventDefault();
			const t = a.dataset.setTheme;
			root.setAttribute('data-theme', t);
			try { localStorage.setItem('theme', t); } catch {}
			items.forEach(el => el.setAttribute('aria-checked', String(el === a)));
			trigger?.focus();
		});

		// Navigation clavier dans le menu
		menu.addEventListener('keydown', (e) => {
			const i = items.indexOf(document.activeElement);
			if (e.key === 'ArrowDown') { e.preventDefault(); (items[i + 1] || items[0]).focus(); }
			else if (e.key === 'ArrowUp') { e.preventDefault(); (items[i - 1] || items[items.length - 1]).focus(); }
			else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.activeElement.click(); }
			else if (e.key === 'Escape') { e.preventDefault(); trigger?.focus(); }
		});
	});
</script>
